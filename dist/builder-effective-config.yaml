directories:
  output: dist
  buildResources: build
appId: com.sts2.mod-manager
productName: STS2 Mod Manager
files:
  - filter:
      - main.js
      - preload.js
      - dist/**/*
      - src/index.html
      - src/output.css
asarUnpack:
  - node_modules/node-unrar-js/**/*
win:
  target:
    - target: portable
      arch:
        - x64
portable:
  artifactName: STS2ModManager.exe
compression: maximum
electronVersion: 29.4.6
